<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script defer src="script.js"></script>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <title>Library</title>
    </head>
    <body>
        <div class="header">
            <h1>Book Library</h1>
            <button id="add-book-btn">Add Book</button>
            <button id="del-book-btn">Delete</button>
        </div>
        <div class="main-body"></div>
        <dialog id="add-book-dialog">
            <form>
                <h2>Enter book details</h2>
                <label for="title">Title:</label>
                <input id="title" type="text" required>
                <label for="author">Author:</label>
                <input id="author" type="text" required>
                <label for="pages">Pages:</label>
                <input id="pages" type="number" required>

                <fieldset>
                    <legend>Already read?</legend>

                    <label for="yes">
                        <input id="yes" type="radio" name="read" checked>
                        Yes
                    </label>
                    <label for="no">
                        <input id="no" type="radio" name="read">
                        No
                    </label>
                </fieldset>
                <div class="dialog-buttons">
                    <button type="button" id="cancel-dialog">Cancel</button>
                    <button type="submit" id="submit-dialog">Done</button>
                </div>
            </form>
        </dialog>
    </body>
</html>
